<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLOPER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
url("background.png");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

h1{
font-size:8rem;
font-weight:900;
letter-spacing:12px;
text-transform:uppercase;
text-shadow:0 0 20px rgba(0,0,0,.8);
}

.quote{
margin-top:15px;
font-size:1.6rem;
font-weight:bold;
letter-spacing:4px;
color:#b7ff00;
text-transform:uppercase;
}

.btn{
margin-top:40px;
padding:16px 45px;
background:#b7ff00;
color:black;
text-decoration:none;
font-weight:bold;
font-size:18px;
border-radius:5px;
transition:.3s;
}

.btn:hover{
background:white;
transform:scale(1.08);
}

/* PRODUCTEN */

.products{
background:#050505;
padding:90px 40px;
text-align:center;
}

.products h2{
font-size:3rem;
margin-bottom:50px;
letter-spacing:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
max-width:1200px;
margin:auto;
}

.card{
background:#111;
padding:30px;
border-radius:15px;
transition:.3s;
border:1px solid #222;
}

.card:hover{
transform:translateY(-10px);
border:1px solid #b7ff00;
box-shadow:0 0 20px #b7ff00;
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:20px;
}

.card h3{
margin-bottom:10px;
font-size:1.5rem;
}

.price{
color:#b7ff00;
font-size:1.2rem;
font-weight:bold;
}

footer{
padding:35px;
background:#000;
text-align:center;
color:#777;
}

</style>

</head>
<body>

<section class="hero">

<h1>SLOPER</h1>

<p class="quote">
DESTROY AVERAGE
</p>

<a href="#shop" class="btn">
SHOP NOW
</a>

</section>

<section class="products" id="shop">

<h2>COLLECTIE</h2>

<div class="grid">

<div class="card">
<h3>Oversized Tee</h3>
<p class="price">€29,99</p>
</div>

<div class="card">
<h3>Heavy Hoodie</h3>
<p class="price">€59,99</p>
</div>

<div class="card">
<h3>Joggers</h3>
<p class="price">€49,99</p>
</div>

</div>

</section>

<footer>
© 2026 SLOPER • DESTROY AVERAGE
</footer>

</body>
</html>
